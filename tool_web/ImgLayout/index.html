<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>照片拼图生成器</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary-btn: #667bff;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #preview-container {
            width: 80vw;
            flex: 0 0 auto;
            aspect-ratio: 9 / 16;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: #000;
            margin-top: 10px;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            flex: 0 0 auto;
        }

        .controls {
            width: 100%;
            padding: 20px;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .color-pickers {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .color-pickers input {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            background: none;
            appearance: none;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .color-pickers input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-pickers input::-webkit-color-swatch { border: none; border-radius: 4px; }

        #download-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-btn);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }

        #download-btn:hover {
            background-color: #0056b3;
        }

        #hidden-file-input { display: none; }
    </style>
</head>
<body>

    <div id="preview-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div class="color-pickers" id="color-pickers"></div>
        <button id="download-btn" type="button">导出拼图</button>
    </div>

    <input type="file" id="hidden-file-input" accept="image/*">

    <script>
        class PhotoPuzzle {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.downloadBtn = document.getElementById('download-btn');
                this.colorPickerContainer = document.getElementById('color-pickers');
                this.hiddenInput = document.getElementById('hidden-file-input');

                this.CONFIG = {
                    width: 1280,
                    height: 2276,
                    rainbow: {
                        x: 350,
                        y: 60,
                        width: 580,
                        itemHeight: 360,
                        gap: 70,
                        defaultColors: ['#661A66', '#663399', '#22DDEE', '#FFD700', '#DD2040','#993399']
                    },
                    padding: 30,
                    // 这里的颜色作为全尺寸底图
                    placeholderBaseColor: '#00000011' 
                };

                this.images = new Array(this.CONFIG.rainbow.defaultColors.length).fill(null);
                this.colors = [...this.CONFIG.rainbow.defaultColors];
                this.bgImage = null;
                this.pendingIndex = null;

                this.initCanvas();
                this.initColorPickers();
                this.bindEvents();
                this.render();
            }

            initCanvas() {
                this.canvas.width = this.CONFIG.width;
                this.canvas.height = this.CONFIG.height;
            }

            initColorPickers() {
                this.CONFIG.rainbow.defaultColors.forEach((color, index) => {
                    const input = document.createElement('input');
                    input.type = 'color';
                    input.value = color;
                    
                    input.addEventListener('change', (e) => {
                        this.colors[index] = e.target.value;
                        this.render();
                    });

                    this.colorPickerContainer.appendChild(input);
                });
            }

            bindEvents() {
                this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
                this.hiddenInput.addEventListener('change', (e) => this.handleFileSelect(e));
                this.downloadBtn.addEventListener('click', () => this.exportImage());
            }

            handleCanvasClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;

                const clickX = (e.clientX - rect.left) * scaleX;
                const clickY = (e.clientY - rect.top) * scaleY;

                for (let i = 0; i < this.CONFIG.rainbow.defaultColors.length - 1; i++) {
                    const r = this.CONFIG.rainbow;
                    const currentY = r.y + (i * (r.itemHeight + r.gap));
                    const imgX = r.x + this.CONFIG.padding;
                    const imgY = currentY + this.CONFIG.padding;
                    const imgW = r.width - (this.CONFIG.padding * 2);
                    const imgH = r.itemHeight - (this.CONFIG.padding * 2);

                    if (
                        clickX >= imgX &&
                        clickX <= imgX + imgW &&
                        clickY >= imgY &&
                        clickY <= imgY + imgH
                    ) {
                        this.pendingIndex = i;
                        this.hiddenInput.click();
                        return;
                    }
                }

                const rainbow = this.CONFIG.rainbow;
                const rainbowBottom = rainbow.y + (rainbow.itemHeight + rainbow.gap) * this.colors.length - rainbow.gap;

                const isInsideRainbow = (
                    clickX >= rainbow.x &&
                    clickX <= rainbow.x + rainbow.width &&
                    clickY >= rainbow.y &&
                    clickY <= rainbowBottom
                );

                if (!isInsideRainbow) {
                    this.pendingIndex = 'background';
                    this.hiddenInput.click();
                }
            }

            async handleFileSelect(e) {
                const file = e.target.files[0];
                if (!file) return;

                if (this.pendingIndex === 'background') {
                    if (this.bgImage) URL.revokeObjectURL(this.bgImage.src);
                    this.bgImage = await this.loadImage(URL.createObjectURL(file));
                } else if (this.pendingIndex !== null) {
                    if (this.images[this.pendingIndex]) URL.revokeObjectURL(this.images[this.pendingIndex].src);
                    this.images[this.pendingIndex] = await this.loadImage(URL.createObjectURL(file));
                }

                this.render();
                this.pendingIndex = null;
                this.hiddenInput.value = '';
            }

            loadImage(src) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => resolve(null);
                    img.src = src;
                });
            }

            /**
             * 修正绘制顺序：
             * 1. 先画全尺寸半透明黑底 (作为背景)
             * 2. 再画中间实心黑块 (作为占位核心) 或 图片
             */
            drawImageBox(img, x, y, w, h) {
                // 1. 绘制全尺寸半透明黑底 (包含 padding 区域)
                this.ctx.fillStyle = this.CONFIG.placeholderBaseColor;
                this.ctx.fillRect(x, y, w, h);

                // 计算内部区域
                const innerX = x + this.CONFIG.padding;
                const innerY = y + this.CONFIG.padding;
                const innerW = w - (this.CONFIG.padding * 2);
                const innerH = h - (this.CONFIG.padding * 2);

                if (img) {
                    // 2. 有图：绘制图片
                    const imgRatio = img.width / img.height;
                    const boxRatio = innerW / innerH;
                    let sx = 0, sy = 0, sw = img.width, sh = img.height;

                    if (imgRatio > boxRatio) {
                        sh = img.height;
                        sw = sh * boxRatio;
                        sx = (img.width - sw) / 2;
                    } else {
                        sw = img.width;
                        sh = sw / boxRatio;
                        sy = (img.height - sh) / 2;
                    }
                    this.ctx.drawImage(img, sx, sy, sw, sh, innerX, innerY, innerW, innerH);
                } else {
                    // 2. 无图：绘制中间实心黑块
                    this.ctx.fillStyle = '#1a1a1a';
                    this.ctx.fillRect(innerX, innerY, innerW, innerH);
                }
            }

            roundRect(x, y, width, height, radius) {
                this.ctx.beginPath();
                this.ctx.moveTo(x + radius, y);
                this.ctx.lineTo(x + width - radius, y);
                this.ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                this.ctx.lineTo(x + width, y + height - radius);
                this.ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                this.ctx.lineTo(x + radius, y + height);
                this.ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                this.ctx.lineTo(x, y + radius);
                this.ctx.quadraticCurveTo(x, y, x + radius, y);
                this.ctx.closePath();
            }

            render() {
                const { width, height } = this.CONFIG;
                this.ctx.clearRect(0, 0, width, height);

                // 1. 绘制背景
                if (this.bgImage) {
                    const bgRatio = this.bgImage.width / this.bgImage.height;
                    const canvasRatio = width / height;
                    let dw = width, dh = height, dx = 0, dy = 0;

                    if (bgRatio > canvasRatio) {
                        dw = height * bgRatio;
                        dx = (width - dw) / 2;
                    } else {
                        dh = width / bgRatio;
                        dy = (height - dh) / 2;
                    }
                    this.ctx.drawImage(this.bgImage, dx, dy, dw, dh);
                } else {
                    this.ctx.fillStyle = '#1a1a1a';
                    this.ctx.fillRect(0, 0, width, height);
                }

                // 2. 绘制彩虹渐变层
                const r = this.CONFIG.rainbow;
                const gradientHeight = (r.itemHeight + r.gap) * 5 - r.gap + 50;
                const gradient = this.ctx.createLinearGradient(0, r.y, 0, r.y + gradientHeight);
                
                this.colors.forEach((color, index) => {
                    gradient.addColorStop(index / (this.colors.length - 1), color);
                });

                this.roundRect(r.x, r.y, r.width, gradientHeight, 0);
                this.ctx.fillStyle = gradient;
                this.ctx.fill();

                // 3. 绘制人像格子
                [1,1,1,1,1].forEach((color, index) => {
                    const currentY = r.y + (index * (r.itemHeight + r.gap));
                    this.drawImageBox(this.images[index], r.x, currentY, r.width, r.itemHeight);
                });
            }

            exportImage() {
                const link = document.createElement('a');
                link.download = 'puzzle-result.png';
                link.href = this.canvas.toDataURL('image/png', 1.0);
                link.click();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PhotoPuzzle();
        });
    </script>
</body>
</html>
